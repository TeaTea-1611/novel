mutation CreateChapter(
  $bookId: Int!
  $order: Int!
  $title: String!
  $content: String!
  $publishAt: Timestamp!
  $unlockPrice: Int!
) {
  createChapter(
    bookId: $bookId
    order: $order
    title: $title
    content: $content
    publishAt: $publishAt
    unlockPrice: $unlockPrice
  ) {
    success
    message
    chapter {
      ...chapter
    }
  }
}

mutation SwapChapters($bookId: Int!, $data: [SwapChapterInput!]!) {
  swapChapters(bookId: $bookId, data: $data) {
    ...chapter
  }
}

mutation DeleteChapter($chapterId: Int!) {
  deleteChapter(chapterId: $chapterId) {
    success
    message
  }
}

mutation UpdateChapter(
  $bookId: Int!
  $chapterId: Int!
  $title: String!
  $content: String!
  $publishAt: Timestamp!
  $unlockPrice: Int!
) {
  updateChapter(
    bookId: $bookId
    chapterId: $chapterId
    title: $title
    content: $content
    publishAt: $publishAt
    unlockPrice: $unlockPrice
  ) {
    success
    message
    chapter {
      ...chapter
    }
  }
}
